  <text x="677" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#189AB4">Active Customers</text>
  <text x="677" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#05445E">186</text>
  <text x="677" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">▼ 2.3%</text>

