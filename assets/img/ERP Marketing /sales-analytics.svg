  <text x="85" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#05445E" font-weight="bold">#1</text>
  <text x="120" y="565" font-family="Arial, sans-serif" font-size="10" fill="#333">Sharma Construction</text>
  <text x="350" y="565" font-family="Arial, sans-serif" font-size="10" fill="#333">28</text>
  <text x="420" y="565" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#05445E">₹8.45L</text>
