  <text x="125" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#05445E">₹42.8L</text>
  <text x="125" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">▲ 18.4%</text>

  <rect x="225" y="110" width="170" height="90" rx="12" fill="#FFFFFF" stroke="#189AB4" stroke-width="2"/>
  <text x="310" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#189AB4">Avg Order Value</text>
  <text x="310" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#05445E">₹1.85L</text>
  <text x="310" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">▲ 5.2%</text>

  <rect x="410" y="110" width="170" height="90" rx="12" fill="#FFFFFF" stroke="#75E6DA" stroke-width="2"/>
  <text x="495" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#189AB4">Conversion Rate</text>
  <text x="495" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#05445E">68.5%</text>
  <text x="495" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">▲ 3.1%</text>

