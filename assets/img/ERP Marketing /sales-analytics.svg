  <polyline points="540,568 550,560 560,564 570,556 580,553 590,548" stroke="#2ecc71" stroke-width="2" fill="none"/>

  <!-- Row 2 -->
  <text x="630" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#05445E" font-weight="bold">#2</text>
  <text x="650" y="565" font-family="Arial, sans-serif" font-size="10" fill="#333">Patel Infra</text>
  <text x="730" y="565" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#05445E" font-weight="bold">₹6.22L</text>
