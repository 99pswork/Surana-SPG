  <text x="75" y="542" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#05445E">Rank</text>
  <text x="120" y="542" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#05445E">Customer Name</text>
  <text x="350" y="542" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#05445E">Orders</text>
  <text x="420" y="542" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#05445E">Revenue</text>
  <text x="540" y="542" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#05445E">Trend</text>
