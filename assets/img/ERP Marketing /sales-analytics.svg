  <circle cx="630" cy="340" r="65" fill="none" stroke="#189AB4" stroke-width="20" stroke-dasharray="102 408" stroke-dashoffset="-163" transform="rotate(-90 630 340)"/>
  <circle cx="630" cy="340" r="65" fill="none" stroke="#75E6DA" stroke-width="20" stroke-dasharray="81 408" stroke-dashoffset="-265" transform="rotate(-90 630 340)"/>
  <circle cx="630" cy="340" r="65" fill="none" stroke="#D4F1F4" stroke-width="20" stroke-dasharray="62 408" stroke-dashoffset="-346" transform="rotate(-90 630 340)"/>
